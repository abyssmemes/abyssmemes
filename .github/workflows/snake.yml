name: generate snake animation

on:
  # run twice a day so the snake stays fresh
  schedule:
    - cron: "0 */12 * * *"
  # allow manual runs from the Actions tab
  workflow_dispatch:
  # also run on every push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake game from contribution graph
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          # matrix-green palette: empty cell + 4 contribution levels
          outputs: |
            dist/snake.svg?color_snake=39d353&color_dots=161b22,0e4429,006d32,26a641,39d353

      - name: Push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
